name: Upstream Sync

on:
  schedule:
    - cron: '17 3 * * *'  # 每天 UTC 03:17 (北京时间 11:17)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/lizhipay/acg-faka.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for updates
        id: check
        run: |
          LOCAL_SHA=$(git rev-parse main)
          UPSTREAM_SHA=$(git rev-parse upstream/master || git rev-parse upstream/main)
          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "No updates found."
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Updates detected: $LOCAL_SHA -> $UPSTREAM_SHA"
            # 记录变更日志
            CHANGES=$(git log --oneline main..upstream/master 2>/dev/null || git log --oneline main..upstream/main)
            echo "changes<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          UPSTREAM_BRANCH=$(git branch -r --list 'upstream/master' | head -1 | xargs)
          if [ -z "$UPSTREAM_BRANCH" ]; then
            UPSTREAM_BRANCH="upstream/main"
          fi
          git merge "$UPSTREAM_BRANCH" --no-edit

      - name: Push to main
        if: steps.check.outputs.has_updates == 'true'
        run: git push origin main

      - name: Notify Feishu
        if: steps.check.outputs.has_updates == 'true'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": { "tag": "plain_text", "content": "📦 acg-faka 上游更新" },
                "template": "orange"
              },
              "elements": [
                {
                  "tag": "markdown",
                  "content": "**仓库**: ${{ github.repository }}\n\n**变更记录**:\n\`\`\`\n${{ steps.check.outputs.changes }}\n\`\`\`\n\n⚠️ 请检查是否与 nsfe 分支的修改存在冲突。"
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": { "tag": "plain_text", "content": "查看仓库" },
                      "url": "https://github.com/${{ github.repository }}/compare/nsfe...main",
                      "type": "primary"
                    }
                  ]
                }
              ]
            }
          }
          EOF
          )"
